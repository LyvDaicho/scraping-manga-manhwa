name: Manga Tracker CI

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Create .env
        run: |
          echo "DISCORD_MANGA_WEBHOOK_URL=${{ secrets.DISCORD_MANGA_WEBHOOK_URL }}" >> .env

      - name: Run script
        run: |
          python scripts/run_manga.py
